appName: nuts
image:
  repository: 708632609614.dkr.ecr.us-east-1.amazonaws.com/nuts
container:
  port: 5000
  command: ["npm"]
  args: ["start"]
resources:
  limits:
    memory: 600Mi
  requests:
    cpu: 50m
    memory: 200Mi
autoscaling:
  maxReplicas: 3
envVars:
  # Non-secret config
  S3_BUCKET: systm-releases
  S3_REGION: us-east-1
  TRUST_PROXY: "true"
  # Secrets injected from 1Password (enableSecretInjection: true)
  S3_KEY: op://PROD_nuts/S3_KEY/notesPlain
  S3_SECRET: op://PROD_nuts/S3_SECRET/notesPlain
  API_USERNAME: op://PROD_nuts/API_USERNAME/notesPlain
  API_PASSWORD: op://PROD_nuts/API_PASSWORD/notesPlain
service:
  type: ClusterIP
  port: 5000
ingress:
  enabled: false
  # wahooligan.com host under the existing wildcard cert. Cloudflare maps the
  # public systm-download.wahoofitness.com to this origin at cutover (Path 1).
  hostUrl: systm-download.prod.wahooligan.com
enableSecretInjection: true
gateway:
  enabled: true
